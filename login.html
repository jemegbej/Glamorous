
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Glamour Registration</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:#111;
padding:40px;
border-radius:25px;
border:1px solid rgba(255,215,0,.2);
}

.logo{
text-align:center;
font-size:30px;
font-weight:800;
color:#FFD700;
margin-bottom:15px;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:30px;
}

input{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1d1d1d;
color:white;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:50px;
background:#FFD700;
color:black;
font-weight:700;
cursor:pointer;
}

.register-link{
text-align:center;
margin-top:20px;
color:#aaa;
}

.register-link a{
color:#FFD700;
text-decoration:none;
}

</style></head><body><div class="container"><div class="logo">
💎 GLAMOUR LOGIN
</div><p class="subtitle">
Login to access your dashboard
</p><form action="dashboard.html"><input type="email" placeholder="Email Address" required><input type="password" placeholder="Password" required><button type="submit">
LOGIN
</button></form><div class="register-link">

<a href="register.html">Create Account</a>
</div></div></body>
</html>
